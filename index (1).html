<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Math Adventure</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: 'Arial Black', sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            margin: 10px 0 5px 0;
            font-size: 1.4rem;
            color: #ffde22;
            text-shadow: 2px 2px #000;
        }

        .painel-topo {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .info-box {
            background: #222;
            padding: 5px 12px;
            border-radius: 10px;
            border: 2px solid #444;
        }

        #canvas-container {
            position: relative;
            display: inline-block;
            background: #000;
            border: 3px solid #fff;
            border-radius: 8px;
        }

        canvas {
            display: block;
        }

        /* 🧮 CAIXA DO DESAFIO MATEMÁTICO */
        #math-popup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1c1c2e;
            border: 4px solid #ffde22;
            border-radius: 15px;
            padding: 20px;
            width: 280px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        #math-question {
            font-size: 1.6rem;
            color: #ffde22;
            margin-bottom: 15px;
        }

        #math-input {
            width: 100px;
            font-size: 1.5rem;
            padding: 5px;
            text-align: center;
            border: 2px solid #fff;
            border-radius: 8px;
            background: #000;
            color: #fff;
            font-family: monospace;
            margin-bottom: 15px;
        }

        .btn-math {
            background-color: #00a800;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }

        /* 📱 CONTROLES VIRTUAIS */
        .controles-touch {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }

        .direcionais {
            display: flex;
            gap: 12px;
        }

        .btn-game {
            width: 60px;
            height: 60px;
            background-color: #333;
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 1.6rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px #111;
            touch-action: manipulation;
        }

        .btn-game:active {
            box-shadow: 0 1px #111;
            transform: translateY(3px);
            background-color: #555;
        }

        .btn-pulo {
            background-color: #ff414d;
            border-color: #ffde22;
            width: 70px;
            height: 70px;
        }
    </style>
</head>
<body>

    <h1>🍄 SUPER MATH ADVENTURE 🌟</h1>

    <div class="painel-topo">
        <div class="info-box">Fase: <span id="txt-fase">1 / 100</span></div>
        <div class="info-box">🪙 Moedas: <span id="txt-moedas">0</span></div>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas" width="440" height="240"></canvas>

        <div id="math-popup">
            <div style="font-size: 0.9rem; color: #aaa; margin-bottom: 5px;">🌟 DESAFIO PARA PASSAR! 🌟</div>
            <div id="math-question">2 + 3 = ?</div>
            <input type="number" id="math-input" pattern="\d*" placeholder="?">
            <button class="btn-math" onclick="checarRespostaMatematica()">RESPONDER 💥</button>
        </div>
    </div>

    <div class="controles-touch">
        <div class="direcionais">
            <button class="btn-game" id="btn-esq" ontouchstart="moverEsq(true)" ontouchend="moverEsq(false)" onmousedown="moverEsq(true)" onmouseup="moverEsq(false)" onmouseleave="moverEsq(false)">◀</button>
            <button class="btn-game" id="btn-dir" ontouchstart="moverDir(true)" ontouchend="moverDir(false)" onmousedown="moverDir(true)" onmouseup="moverDir(false)" onmouseleave="moverDir(false)">▶</button>
        </div>
        <button class="btn-game btn-pulo" id="btn-pular" ontouchstart="acionarPulo()" onmousedown="acionarPulo()">PULO</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let faseAtual = 1;
        let moedas = 0;
        let jogoPausadoParaMatematica = false;
        let respostaCorreta = 0;

        // Gerador de cores dinâmicas para as 100 fases diferentes
        const coresBonecos = ["#ff414d", "#2ee541", "#b642ff", "#00d8ff", "#ff9f00", "#ff00bb", "#00ffaa"];
        const coresFundos = ["#5c94fc", "#000044", "#0b001a", "#1a3c40", "#401212", "#1d2a44", "#221f1f"];
        const coresChaos = ["#fcb444", "#555555", "#3d1054", "#61b15a", "#ba7967", "#706c61", "#4e3629"];

        // OBJETO DO JOGADOR
        let player = {
            x: 40,
            y: 80,
            largura: 20,
            altura: 24,
            velX: 0,
            velY: 0,
            noChao: false
        };

        let plataformas = [];
        let moedasLista = [];
        let canoSaida = { x: 390, y: 150, largura: 30, altura: 40 };
        let teclas = { esquerda: false, direita: false };

        // 🎵 SINTETIZADOR DE EFEITOS DE SOM (Via Áudio Web Puro)
        let audioCtx = null;
        function tocarSom(tipo) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (tipo === 'moeda') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // Nota D5
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08); // Nota A5
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.25);
                } 
                else if (tipo === 'acerto') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); // E5
                    osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.16); // G5
                    osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.24); // C6
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                } 
                else if (tipo === 'erro') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, audioCtx.currentTime); // Som baixo de erro
                    osc.frequency.linearRampToValueAtTime(110, audioCtx.currentTime + 0.25);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.25);
                }
            } catch(e) { console.log("Áudio aguardando toque do usuário"); }
        }

        // CARREGADOR DE FASES SEQUENCIAIS (ATÉ 100)
        function carregarFase(fase) {
            faseAtual = fase;
            if (faseAtual > 100) {
                alert("🏆 INCRÍVEL! Você venceu as 100 fases e salvou a matemática!");
                faseAtual = 1;
                moedas = 0;
            }

            document.getElementById("txt-fase").innerText = faseAtual + " / 100";
            document.getElementById("txt-moedas").innerText = moedas;

            player.x = 40;
            player.y = 80;
            player.velX = 0;
            player.velY = 0;
            player.noChao = false;

            // Define as cores mudando em ciclos de padrões a cada fase
            let indexCor = (faseAtual - 1) % 7;
            canvas.style.borderColor = coresBonecos[indexCor];

            // Configuração do mapa gerado dinamicamente
            plataformas = [
                { x: 0, y: 190, largura: 440, altura: 50 } // Chão estável
            ];

            // Monta variações de caminhos baseadas na fase
            if (faseAtual % 3 === 1) {
                plataformas.push({ x: 120, y: 140, largura: 80, altura: 15 });
                plataformas.push({ x: 250, y: 110, largura: 80, altura: 15 });
            } else if (faseAtual % 3 === 2) {
                plataformas.push({ x: 100, y: 145, largura: 60, altura: 15 });
                plataformas.push({ x: 200, y: 115, largura: 60, altura: 15 });
                plataformas.push({ x: 300, y: 145, largura: 60, altura: 15 });
            } else {
                plataformas.push({ x: 140, y: 130, largura: 140, altura: 15 });
            }

            // Distribuindo moedas extras
            moedasLista = [
                { x: 150, y: 80, coletada: false },
                { x: 270, y: 70, coletada: false }
            ];
        }

        // DISPARADOR DO EVENTO DE CONTAS MATEMÁTICAS
        function abrirDesafioMatematica() {
            jogoPausadoParaMatematica = true;
            
            // Cria contas fáceis para crianças (números entre 1 e 10)
            let numA = Math.floor(Math.random() * 9) + 1;
            let numB = Math.floor(Math.random() * 9) + 1;
            let operacao = Math.random() > 0.4 ? "+" : "-";

            if (operacao === "-") {
                if (numA < numB) { let temp = numA; numA = numB; numB = temp; } // Evita resultado negativo
                respostaCorreta = numA - numB;
            } else {
                respostaCorreta = numA + numB;
            }

            document.getElementById("math-question").innerText = numA + " " + operacao + " " + numB + " = ?";
            document.getElementById("math-input").value = "";
            document.getElementById("math-popup").style.display = "block";
            document.getElementById("math-input").focus();
        }

        function checarRespostaMatematica() {
            let userAns = parseInt(document.getElementById("math-input").value);
            
            if (userAns === respostaCorreta) {
                tocarSom('acerto');
                document.getElementById("math-popup").style.display = "none";
                jogoPausadoParaMatematica = false;
                
                // Passa de fase com sucesso
                faseAtual++;
                carregarFase(faseAtual);
            } else {
                tocarSom('erro');
                alert("Xiii, resposta errada! Tente calcular de novo!");
                document.getElementById("math-input").value = "";
            }
        }

        // CAPTURA DE CONTROLES
        function moverEsq(ativo) { teclas.esquerda = ativo; }
        function moverDir(ativo) { teclas.direita = ativo; }
        function acionarPulo() {
            if (player.noChao && !jogoPausadoParaMatematica) {
                // Força do pulo ajustável levemente com o avanço
                player.velY = -11;
                player.noChao = false;
            }
        }

        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a") teclas.esquerda = true;
            if (e.key === "ArrowRight" || e.key === "d") teclas.direita = true;
            if (e.key === "ArrowUp" || e.key === " " || e.key === "w") acionarPulo();
            if (e.key === "Enter" && jogoPausadoParaMatematica) checarRespostaMatematica();
        });
        window.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a") teclas.esquerda = false;
            if (e.key === "ArrowRight" || e.key === "d") teclas.direita = false;
        });

        // MECÂNICA PRINCIPAL DO MOTOR DO JOGO
        function atualizar() {
            if (jogoPausadoParaMatematica) return;

            let indexCor = (faseAtual - 1) % 7;
            // Aumenta a velocidade sutilmente a cada patamar de fase
            let velEstagio = 4 + Math.floor(faseAtual / 25);

            if (teclas.esquerda) player.velX = -velEstagio;
            else if (teclas.direita) player.velX = velEstagio;
            else player.velX = 0;

            player.velY += 0.6; // Gravidade fixa equilibrada

            player.x += player.velX;
            player.y += player.velY;

            if (player.x < 0) player.x = 0;
            if (player.x + player.largura > canvas.width) player.x = canvas.width - player.largura;

            if (player.y > canvas.height) {
                carregarFase(faseAtual); // Respawn seguro
                return;
            }

            player.noChao = false;
            for (let i = 0; i < plataformas.length; i++) {
                let plat = plataformas[i];
                if (player.x < plat.x + plat.largura && player.x + player.largura > plat.x &&
                    player.y + player.altura >= plat.y && player.y + player.altura - player.velY <= plat.y + 8) {
                    player.velY = 0;
                    player.y = plat.y - player.altura;
                    player.noChao = true;
                }
            }

            // Captura de Moedas
            for (let i = 0; i < moedasLista.length; i++) {
                let m = moedasLista[i];
                if (!m.coletada &&
                    player.x < m.x + 12 && player.x + player.largura > m.x &&
                    player.y < m.y + 12 && player.y + player.altura > m.y) {
                    m.coletada = true;
                    moedas++;
                    document.getElementById("txt-moedas").innerText = moedas;
                    tocarSom('moeda');
                }
            }

            // Chegada no cano dispara a verificação matemática
            if (player.x < canoSaida.x + canoSaida.largura && player.x + player.largura > canoSaida.x &&
                player.y + player.altura >= canoSaida.y && player.y <= canoSaida.y + 40) {
                player.x = canoSaida.x - 22; // Trava o personagem na boca do cano
                abrirDesafioMatematica();
            }
        }

        // DESENHADOR DE ELEMENTOS VISUAIS
        function renderizar() {
            let indexCor = (faseAtual - 1) % 7;

            // Fundo e Chão dinâmicos
            ctx.fillStyle = coresFundos[indexCor];
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < plataformas.length; i++) {
                let plat = plataformas[i];
                ctx.fillStyle = coresChaos[indexCor];
                ctx.fillRect(plat.x, plat.y, plat.largura, plat.altura);
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(plat.x, plat.y, plat.largura, 2);
            }

            // Desenha moedas coletáveis
            for (let i = 0; i < moedasLista.length; i++) {
                let m = moedasLista[i];
                if (!m.coletada) {
                    ctx.fillStyle = "#ffde22";
                    ctx.beginPath();
                    ctx.arc(m.x + 6, m.y + 6, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = "#000";
                    ctx.stroke();
                }
            }

            // Desenha o Cano Verde Estilizado
            ctx.fillStyle = "#00a800";
            ctx.fillRect(canoSaida.x, canoSaida.y, canoSaida.largura, 40);
            ctx.fillStyle = "#00d800";
            ctx.fillRect(canoSaida.x - 2, canoSaida.y, canoSaida.largura + 4, 10);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(canoSaida.x - 2, canoSaida.y, canoSaida.largura + 4, 10);
            ctx.strokeRect(canoSaida.x, canoSaida.y + 10, canoSaida.largura, 30);

            // Desenha o Herói da Fase
            ctx.fillStyle = coresBonecos[indexCor];
            ctx.fillRect(player.x, player.y, player.largura, player.altura);

            // Olhos direcionais do bloco herói
            ctx.fillStyle = "#ffffff";
            if (teclas.esquerda) {
                ctx.fillRect(player.x + 3, player.y + 5, 4, 5);
                ctx.fillStyle = "#000"; ctx.fillRect(player.x + 3, player.y + 6, 2, 3);
            } else {
                ctx.fillRect(player.x + 13, player.y + 5, 4, 5);
                ctx.fillStyle = "#000"; ctx.fillRect(player.x + 15, player.y + 6, 2, 3);
            }
            
            ctx.fillStyle = "#fff";
            ctx.fillRect(player.x, player.y, player.largura, 3);
        }

        function gameLoop() {
            atualizar();
            renderizar();
            requestAnimationFrame(gameLoop);
        }

        // Inicia o fluxo das 100 fases
        carregarFase(1);
        gameLoop();
    </script>
</body>
</html>
